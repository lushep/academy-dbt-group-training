models:
  - name: dim_customers
    description: One row represents one customer. This table has some metrics
    columns:
      - name: customer_id
        description: This is the PK
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_type: string
      - name: last_name
        data_type: string
      - name: first_order_date
        data_type: date
      - name: most_recent_order_date
        data_type: date
      - name: number_of_orders
        data_type: integer
