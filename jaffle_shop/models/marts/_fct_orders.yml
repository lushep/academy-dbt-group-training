models:
  - name: fct_orders
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg__jaffle_shop__customers')
                field: customer_id
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg__jaffle_shop__orders')
                field: order_id