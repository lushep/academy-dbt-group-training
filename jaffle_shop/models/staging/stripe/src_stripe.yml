sources:
  - name: stripe
    description: This data comes from the Stripe payments
    project: sql-training-422508
    dataset: stripe
    tables:
      - name: payments
        description: One row is one payment
        identifier: payments_12c04
        columns:
          - name: payment_id
            data_tests:
              - unique
              - not_null
          - name: order_id
            data_tests:
              - not_null
              - relationships:
                  field: id
                  to: source('jaffle_shop', 'orders')
          - name: payment_method
            data_tests:
              - accepted_values:
                  values:
                    - bank_transfer
                    - coupon
                    - credit_card
                    - gift_card
          - name: payment_amount
