models:
  - name: stg_stripe__payments
    description: One row equals one payments
    columns:
      - name: payment_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              field: order_id
              to: ref('stg_jaffle_shop__orders')
      - name: payment_method
        data_tests:
          - accepted_values:
              values:
                - bank_transfer
                - coupon
                - credit_card
                - gift_card
      - name: payment_amount