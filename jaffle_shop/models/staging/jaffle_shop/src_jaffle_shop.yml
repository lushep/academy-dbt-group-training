sources:
  - name: jaffle_shop
    description: This data comes from the Jaffle-ator App
    project: sql-training-422508
    dataset: jaffle
    tables:
      - name: orders # what I want it to be called in my project
        description: One row represents one order
        identifier: orders # exact match in the warehouse - this is optional
        columns:
          - name: id
            data_tests:
              - unique
              - not_null
          - name: status
            description: "{{ doc('order_status') }}"
            data_tests:
              - accepted_values:
                  values:
                    - completed
                    - returned
                    - shipped
                    - placed
                    - return_pending
      - name: customers
        description: One row represents one customer
        identifier: customers
        columns:
          - name: id
            data_tests:
              - unique
              - not_null
