sources:
  - name: jaffle_shop
    description: This data comes from the jaffle app
    project: sql-training-422508  
    dataset: jaffle  
    tables:
      - name: orders
        description: One row represents one order
        identifier : orders
        columns:
          - name: status
            description: "{{ doc('order_status') }}"
            data_tests:
              - accepted_values:
                  values:
                    - completed
                    - returned
                    - shipped
                    - placed
                    - return_pending
      - name: customers
        description: One row represents one customer
        identifier: customers
        columns:
          - name: id
            data_tests:
              - unique
              - not_null
