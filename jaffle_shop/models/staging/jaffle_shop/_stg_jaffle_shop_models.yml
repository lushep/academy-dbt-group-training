models:
  - name: stg_jaffle_shop__customers
    columns:
      - name: customer_id
        data_type: integer
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_type: string
      - name: last_name
        data_type: string
  - name: stg_jaffle_shop__orders
    columns:
      - name: order_id
        data_type: integer
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_jaffle_shop__customers')
      - name: order_date
        data_type: date
      - name: status
        description: "{{ doc('order_status')}}"
        data_type: string
        data_tests:
          - accepted_values:
              values:
                - completed
                - returned
                - shipped
                - placed
                - return_pending